<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Payment Portal</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css" />
    <link rel="icon" type="image/x-icon" href="assets/icon.svg" />
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <a class="nav-content" href="/">
        <span class="brand-name">Satnam<span class="brand-dot">.</span>pay</span>
      </a>
    </div>

    <!-- Main Centered Container -->
    <div class="container">
      <div class="payment-card">
        <div class="card-header">
          <div class="shield-icon">
            <i class="bi bi-shield-lock-fill"></i>
          </div>
          <h1>Satnam's Payment Gateway</h1>
          <p>Complete your transaction securely via Stripe</p>
        </div>

        <form id="payment-form" class="payment-form">
          <div class="input-group">
            <label for="emailField"><i class="bi bi-envelope-fill"></i> Email Address</label>
            <input type="email" id="emailField" placeholder="you@example.com" required />
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="nameField"><i class="bi bi-person-fill"></i> Full Name</label>
              <input type="text" id="nameField" placeholder="John Doe" required />
            </div>

            <div class="input-group">
              <label for="amountField"><i class="bi bi-currency-dollar"></i> Amount (USD)</label>
              <input type="number" id="amountField" step="0.01" min="1.00" placeholder="10.00" required />
            </div>
          </div>

          <div class="input-group">
            <label for="descriptionField"><i class="bi bi-chat-left-text-fill"></i> Payment Description / Reference</label>
            <input type="text" id="descriptionField" placeholder="e.g. Consultation fee, support payment" />
          </div>

          <button type="submit" id="pay-btn" class="pay-btn">
            <span>Pay Now</span> <i class="bi bi-arrow-right-short"></i>
          </button>
        </form>

        <div class="card-footer">
          <p><i class="bi bi-patch-check-fill"></i> Guaranteed safe & secure checkout powered by Stripe</p>
        </div>
      </div>
    </div>

    <!-- Payment handling script -->
    <script src="app.js"></script>
  </body>
</html>
